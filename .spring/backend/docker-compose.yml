# Twenty CRM backend stack for local development.
#
# Runs Postgres, Redis, twenty-server, and twenty-worker in containers so the
# only thing left on the host is the frontend (twenty-front) — keeping
# hot-reload of UI code fast while the heavier backend deps stay containerised.
#
# Usage:
#   docker compose up -d --wait     # start (idempotent — no-op when already up)
#   docker compose ps               # status
#   docker compose logs -f server   # tail logs
#   docker compose down             # stop (keeps DB data)
#   docker compose down -v          # stop + wipe DB data
#
# Resume semantics:
#   `up -d` only recreates containers whose config changed; running containers
#   stay running, and named volumes (`db-data`, `server-local-data`) persist
#   across restarts. So re-running the runbook is cheap and non-destructive.

name: twenty-backend

services:
  db:
    image: postgres:16
    restart: unless-stopped
    ports:
      # Map to host 5433 to avoid colliding with a host Postgres on 5432.
      # The frontend never talks to Postgres directly, so this is only useful
      # for psql/devtools poking from the host.
      - "5433:5432"
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
      POSTGRES_DB: ${PG_DB:-default}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["--maxmemory-policy", "noeviction"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    image: twentycrm/twenty:${TWENTY_TAG:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_PORT: 3000
      SERVER_URL: ${SERVER_URL:-http://localhost:3000}
      PG_DATABASE_URL: postgres://${PG_USER:-postgres}:${PG_PASSWORD:-postgres}@db:5432/${PG_DB:-default}
      REDIS_URL: redis://redis:6379
      APP_SECRET: ${APP_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      STORAGE_TYPE: local
      DISABLE_DB_MIGRATIONS: "false"
      DISABLE_CRON_JOBS_REGISTRATION: "false"
    volumes:
      - server-local-data:/app/packages/twenty-server/.local-storage
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:3000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 300s

  worker:
    image: twentycrm/twenty:${TWENTY_TAG:-latest}
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    command: ["yarn", "worker:prod"]
    environment:
      SERVER_URL: ${SERVER_URL:-http://localhost:3000}
      PG_DATABASE_URL: postgres://${PG_USER:-postgres}:${PG_PASSWORD:-postgres}@db:5432/${PG_DB:-default}
      REDIS_URL: redis://redis:6379
      APP_SECRET: ${APP_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      STORAGE_TYPE: local
      # Server owns migrations + cron registration to avoid races.
      DISABLE_DB_MIGRATIONS: "true"
      DISABLE_CRON_JOBS_REGISTRATION: "true"
    volumes:
      - server-local-data:/app/packages/twenty-server/.local-storage

volumes:
  db-data:
  server-local-data:
